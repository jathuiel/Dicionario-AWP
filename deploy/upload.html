<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload de Imagens — Dicionário AWP</title>
  <link rel="stylesheet" href="assets/awp.css">
</head>
<body>

  <aside class="sidebar">
    <a class="logo" href="index.html">
      <img src="assets/simbolo_verum_branco.png" alt="">
       <b>Dicionário Pacotes<br> — AWP</b>
    </a>
    <div class="divisor"></div>
    <nav>
      <a href="index.html" style="animation:fadeUp .4s .1s ease both">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2" stroke="#fff" stroke-width="1.4"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2" stroke="#fff" stroke-width="1.4"/><rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2" stroke="#fff" stroke-width="1.4"/><rect x="9" y="9" width="5.5" height="5.5" rx="1.2" stroke="#fff" stroke-width="1.4"/></svg></span>
        <span class="txt">Início</span>
      </a>
      <a href="cadastro.html" style="animation:fadeUp .4s .15s ease both">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 6h10v7H3z" stroke="#fff" stroke-width="1.4"/><path d="M5 6V3h6v3M5 10h6" stroke="#fff" stroke-width="1.4"/></svg></span>
        <span class="txt">Novo Pacote</span>
      </a>
      <a class="ativo" href="upload.html" style="animation:fadeUp .4s .2s ease both">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10V2.5M4.5 6 8 2.5 11.5 6" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.5 10.5v3h11v-3" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/></svg></span>
        <span class="txt">Enviar Fotos</span>
      </a>
    </nav>
    
  </aside>

  <main class="conteudo conteudo--estreito">

    <div class="titulo-secao">
      <h1>Upload de Imagens</h1>
      <small>A imagem enviada aparece no dicionário do squad, sem alterar o leitor</small>
    </div>

    <div class="painel" style="--d:.05s">
      <h2>Nova imagem</h2>
      <label for="squad">Squad</label>
      <select id="squad"></select>
      <label for="codigo">Código completo do pacote</label>
      <input id="codigo" placeholder="Ex.: KS-N103101-294-S-MT-CWP-001-IWP-042" autocomplete="off">
      <label for="vista">Nome da vista</label>
      <input id="vista" placeholder="Ex.: Top Front ISO" autocomplete="off">
      <label for="arquivo">Imagem (JPEG ou PNG, até 10 MB)</label>
      <input id="arquivo" type="file" accept="image/jpeg,image/png">
      <button id="enviar">Enviar</button>
      <div id="msg"></div>
    </div>

    <div class="painel" style="--d:.1s">
      <h2>Imagens enviadas <small id="contagem"></small></h2>
      <div style="overflow-x:auto;margin-top:10px">
        <table id="tabela" hidden>
          <thead><tr><th>IWP — Vista</th><th>Arquivo</th><th>Tamanho</th></tr></thead>
          <tbody id="linhas"></tbody>
        </table>
      </div>
      <div id="vazio">Nenhuma imagem enviada para este squad ainda.</div>
    </div>

  </main>

  <script>
    const $ = id => document.getElementById(id);
    const esc = s => String(s).replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    async function carregar() {
      const r = await fetch('api/upload/' + $('squad').value);
      const dados = await r.json();
      $('contagem').textContent = dados.length + ' imagem(ns)';
      $('tabela').hidden = dados.length === 0;
      $('vazio').hidden  = dados.length > 0;
      $('linhas').innerHTML = dados.map(d => `
        <tr>
          <td class="cod">${esc(d.iwp)}</td>
          <td>${esc(d.arquivo)}</td>
          <td>${(d.bytes / 1024).toFixed(0)} KB</td>
        </tr>`).join('');
    }

    $('squad').onchange = carregar;

    $('enviar').onclick = async () => {
      const msg = $('msg');
      const arq = $('arquivo').files[0];
      if (!arq) { msg.className = 'erro'; msg.textContent = '✖ Selecione uma imagem.'; return; }

      const form = new FormData();
      form.append('squad',   $('squad').value);
      form.append('codigo',  $('codigo').value);
      form.append('vista',   $('vista').value);
      form.append('arquivo', arq);

      $('enviar').disabled = true;
      msg.className = ''; msg.textContent = 'Enviando e atualizando a base...';
      try {
        const r = await fetch('api/upload', { method: 'POST', body: form });
        const corpo = await r.json();
        if (r.ok) {
          msg.className = 'ok';
          msg.textContent = `✔ ${corpo.substituida ? 'Substituída' : 'Enviada'}: ${corpo.iwp} — abra o dicionário do squad para conferir`;
          $('vista').value = ''; $('arquivo').value = '';
          carregar();
        } else {
          msg.className = 'erro';
          msg.textContent = '✖ ' + (corpo.detail || 'Erro no envio');
        }
      } catch (e) {
        msg.className = 'erro';
        msg.textContent = '✖ Falha de rede: ' + e.message;
      } finally {
        $('enviar').disabled = false;
      }
    };

    // Preenche o select com os squads registrados (api/squads) e carrega o primeiro.
    (async () => {
      const squads = await (await fetch('api/squads', { cache: 'no-store' })).json();
      squads.forEach(s => $('squad').add(new Option(s.nome, s.pasta)));
      carregar();
    })();
  </script>
</body>
</html>
