<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dicionário de Pacotes — AWP</title>
  <link rel="stylesheet" href="assets/awp.css">
</head>
<body>

  <aside class="sidebar">
    <a class="logo" href="index.html">
      <img src="assets/simbolo_verum_branco.png" alt="">
      <b>Dicionário Pacotes<br> — AWP</b>
    </a>
    <div class="divisor"></div>
    <nav>
      <a class="ativo" href="index.html" style="animation:fadeUp .4s .1s ease both">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2" stroke="#fff" stroke-width="1.4"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2" stroke="#fff" stroke-width="1.4"/><rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2" stroke="#fff" stroke-width="1.4"/><rect x="9" y="9" width="5.5" height="5.5" rx="1.2" stroke="#fff" stroke-width="1.4"/></svg></span>
        <span class="txt">Início</span>
      </a>
      <a href="cadastro.html" style="animation:fadeUp .4s .15s ease both">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 6h10v7H3z" stroke="#fff" stroke-width="1.4"/><path d="M5 6V3h6v3M5 10h6" stroke="#fff" stroke-width="1.4"/></svg></span>
        <span class="txt">Novo Pacote</span>
      </a>
      <a href="upload.html" style="animation:fadeUp .4s .2s ease both">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10V2.5M4.5 6 8 2.5 11.5 6" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.5 10.5v3h11v-3" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/></svg></span>
        <span class="txt">Enviar Fotos</span>
      </a>
      
    </nav>
   
  </aside>

  <main class="conteudo">

    <div class="busca">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="#8aa0a0" stroke-width="1.5"/><path d="m10.5 10.5 3 3" stroke="#8aa0a0" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input id="busca" type="search" placeholder="Filtrar equipes por nome ou código…" autocomplete="off">
    </div>

    <div class="kpis">
      <div class="kpi" style="--d:.05s">
        <div class="rotulo">Pacotes de trabalho</div>
        <div class="valor" id="kpi-pacotes">—</div>
        <div class="sub">com imagens no dicionário</div>
      </div>
      <div class="kpi" style="--d:.1s">
        <div class="rotulo">Fotos enviadas</div>
        <div class="valor" id="kpi-fotos">—</div>
        <div class="sub">vistas dos modelos</div>
      </div>
      <div class="kpi" style="--d:.15s">
        <div class="rotulo">Equipes ativas</div>
        <div class="valor" id="kpi-equipes">—</div>
        <div class="sub">dicionários publicados</div>
      </div>
      <div class="kpi" style="--d:.2s">
        <div class="rotulo">IWPs cadastrados</div>
        <div class="valor" id="kpi-iwps">—</div>
        <div class="sub">registros no cadastro</div>
      </div>
    </div>

    <section style="animation:fadeUp .5s .25s ease both">
      <div class="titulo-secao" style="margin-bottom:12px">
        <h1>Escolha a equipe</h1>
        <small>Veja as fotos e pacotes de cada equipe</small>
      </div>
      <div class="equipes" id="equipes">
        <a class="equipe-card equipe-card--nova" href="cadastro.html#squads" style="--d:.55s">
          <span style="font-size:18px;line-height:1">＋</span> Criar nova equipe
        </a>
      </div>
    </section>

  </main>

  <script>
    const $ = id => document.getElementById(id);
    const fmt = n => n == null ? '—' : n.toLocaleString('pt-BR');
    const jfetch = async url => {
      try { const r = await fetch(url, { cache: 'no-store' }); return r.ok ? await r.json() : null; }
      catch { return null; }
    };

    (async () => {
      // Cards das equipes vêm da tabela squad (api/squads), mantida pelo cadastro.
      const squads = await jfetch('api/squads') || [];
      if (squads.length) $('kpi-equipes').textContent = fmt(squads.length);

      const nova = document.querySelector('.equipe-card--nova');
      const cards = squads.map((s, i) => {
        const a = document.createElement('a');
        a.className = 'equipe-card';
        a.href = s.pasta + '/' + s.pasta + '.html';
        a.style.setProperty('--d', (0.3 + i * 0.05) + 's');
        a.dataset.busca = (s.nome + ' ' + s.pasta).toLowerCase();
        a.innerHTML = `
          <div class="equipe-topo">
            <div class="equipe-ico"></div>
            <div><div class="equipe-nome"></div><div class="equipe-slug"></div></div>
          </div>
          <div class="equipe-stats"><span><b>—</b> pacotes</span><span><b>—</b> fotos</span></div>
          <div class="equipe-barra" hidden><div style="width:0"></div></div>`;
        a.querySelector('.equipe-ico').textContent = s.icone || '📦';
        a.querySelector('.equipe-nome').textContent = s.nome;
        a.querySelector('.equipe-slug').textContent = s.pasta;
        nova.before(a);
        return a;
      });

      // Estatísticas reais por equipe (API); sem backend os cards mantêm "—".
      const dados = await Promise.all(squads.map(s => jfetch('api/pacotes/' + s.pasta)));
      const pac = dados.map(d => d && d.length);
      const fot = dados.map(d => d && d.reduce((t, p) => t + Object.keys(p.views || {}).length, 0));
      const maxPac = Math.max(1, ...pac.filter(Number.isFinite));
      cards.forEach((c, i) => {
        if (dados[i] == null) return;
        const b = c.querySelectorAll('.equipe-stats b');
        b[0].textContent = fmt(pac[i]);
        b[1].textContent = fmt(fot[i]);
        const barra = c.querySelector('.equipe-barra');
        barra.hidden = false;
        barra.firstElementChild.style.width = Math.round(pac[i] / maxPac * 100) + '%';
      });
      if (dados.some(d => d != null)) {
        $('kpi-pacotes').textContent = fmt(pac.reduce((t, n) => t + (n || 0), 0));
        $('kpi-fotos').textContent   = fmt(fot.reduce((t, n) => t + (n || 0), 0));
      }

      const iwps = await jfetch('api/iwp');
      if (iwps) $('kpi-iwps').textContent = fmt(iwps.length);
    })();

    // Busca filtra os cards de equipe em tempo real.
    $('busca').oninput = e => {
      const t = e.target.value.trim().toLowerCase();
      document.querySelectorAll('#equipes .equipe-card:not(.equipe-card--nova)')
        .forEach(c => { c.hidden = !!t && !c.dataset.busca.includes(t); });
    };
  </script>
</body>
</html>
